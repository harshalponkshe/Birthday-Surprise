<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>Birthday Quest</title>

<style>

body{
margin:0;
overflow:hidden;
background:url("background.jpg") no-repeat center center fixed;
background-size:100% 100%;
font-family:serif;
cursor:none;
}

.icon{
position:absolute;
width:130px;
height:130px;
border-radius:50%;
border:3px solid gold;
box-shadow:0 0 15px rgba(255,215,0,0.6);
cursor:pointer;
transition:transform .25s, filter .25s, box-shadow .25s;
overflow:hidden;
}

.icon:hover{
transform:scale(1.35);
filter:drop-shadow(0 0 25px gold);
box-shadow:0 0 25px rgba(255,215,0,0.9);
}

#gift1{bottom:120px;left:25%;}
#gift2{top:40%;left:48%;}
#gift3{bottom:120px;right:25%;}

#paimonCursor{
position:fixed;
width:80px;
pointer-events:none;
z-index:9999;
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}
}

.scene{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:black;
flex-direction:column;
}

.full{
width:100vw;
height:100vh;
object-fit:cover;
}

.dialogue{
position:absolute;
bottom:40px;
background:rgba(20,30,60,0.9);
border:3px solid gold;
border-radius:12px;
padding:20px;
color:white;
font-size:26px;
text-align:center;
box-shadow:0 0 15px gold;
}

button{
margin-top:15px;
padding:10px 25px;
font-size:18px;
border:none;
border-radius:8px;
background:gold;
cursor:pointer;
}

/* cinematic unwrap */

#cinematicWrap{
width:100vw;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:black;
overflow:hidden;
}

#fatuiImage{
width:100%;
height:100%;
object-fit:cover;
clip-path: inset(0 50% 0 50%);
animation:unwrap 3s ease forwards;
}

@keyframes unwrap{
0%{clip-path: inset(0 50% 0 50%);}
100%{clip-path: inset(0 0 0 0);}
}

</style>

</head>

<body>

<audio id="bgMusic" loop>
<source src="main-music.mp3" type="audio/mpeg">
</audio>

<audio id="birthdayMusic" loop>
<source src="birthday-music.mp3" type="audio/mpeg">
</audio>

<img id="paimonCursor" src="paimon.png">

<img src="gift1.webp" class="icon" id="gift1" onclick="openScene(1)">
<img src="gift2.webp" class="icon" id="gift2" onclick="openScene(2)">
<img src="gift3.webp" class="icon" id="gift3" onclick="openScene(3)">

<div class="scene" id="scene1">
<img src="image1.png" class="full">
<div class="dialogue">
Tanjoubi Omedetou !!! 🎉
<br>
<button onclick="closeScenes()">Return</button>
</div>
</div>

<div class="scene" id="scene2">

<div id="cinematicWrap">
<img src="fatui.png" id="fatuiImage">
</div>

<audio id="harbingerMusic">
<source src="harbinger-theme.mp3" type="audio/mpeg">
</audio>

<audio id="voiceMessage">
<source src="soundtrack.mp3" type="audio/mpeg">
</audio>

</div>

<div class="scene" id="scene3">
<video id="video" class="full">
<source src="video.mp4" type="video/mp4">
</video>
</div>

<script>

window.addEventListener("load", () => {

const bgMusic=document.getElementById("bgMusic");

bgMusic.volume=.5;

bgMusic.play().catch(()=>{
document.body.addEventListener("click",()=>{
bgMusic.play();
},{once:true});
});

});

document.addEventListener("mousemove",e=>{
let p=document.getElementById("paimonCursor");
p.style.left=e.clientX+"px";
p.style.top=e.clientY+"px";
});

function openScene(n){

let bg=document.getElementById("bgMusic");
let bday=document.getElementById("birthdayMusic");

document.querySelectorAll(".scene").forEach(s=>s.style.display="none");
document.getElementById("scene"+n).style.display="flex";

if(n===1){
bg.pause();
bday.currentTime=0;
bday.play();
}

if(n===2){

bg.pause();

let music=document.getElementById("harbingerMusic");
let voice=document.getElementById("voiceMessage");

music.currentTime=0;
music.play();

setTimeout(()=>{

music.playbackRate=.7;

voice.currentTime=0;
voice.play();

voice.onended=()=>{
music.pause();
closeScenes();
};

},4000);

}

if(n===3){

bg.pause();

let v=document.getElementById("video");
v.currentTime=0;
v.play();
v.onended=closeScenes;

}

}

function closeScenes(){

document.querySelectorAll(".scene").forEach(s=>s.style.display="none");

let bday=document.getElementById("birthdayMusic");
bday.pause();

let bg=document.getElementById("bgMusic");
bg.play();

}

</script>

</body>
</html>
